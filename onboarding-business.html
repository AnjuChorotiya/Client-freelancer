<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business details — Wisemonk</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-50: #E8F2FF;
      --primary-100: #C5DCFF;
      --primary-500: #2684FF;
      --primary-600: #1A6FE0;
      --primary-700: #1059BD;
      --neutral-0: #FFFFFF;
      --neutral-50: #F7F8FA;
      --neutral-100: #EEF0F4;
      --neutral-200: #DDE1E9;
      --neutral-300: #C4CAD6;
      --neutral-400: #9AA2B2;
      --bg-subtle: #F1F8FF;
      --border: #EEF0F4;
      --border-strong: #DDE1E9;
      --text-primary: #222733;
      --text-secondary: #363D4D;
      --text-muted: #85878d;
      --grey-700: #222224;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Satoshi', sans-serif;
      background: var(--bg-subtle);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex; flex-direction: column;
      padding-bottom: 88px; /* room for footer */
    }
    a { text-decoration: none; color: inherit; }

    /* Top bar */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 32px;
      background: var(--neutral-0);
    }
    .topbar-logo {
      display: flex; align-items: center;
      height: 26px; overflow: hidden;
    }
    .topbar-logo img { height: 56px; width: auto; margin-top: -30px; display: block; }
    .topbar-right { display: flex; align-items: center; gap: 14px; }
    .need-help {
      padding: 9px 16px;
      background: var(--primary-50);
      color: var(--primary-600);
      border-radius: 100px;
      font-size: 13.5px;
      font-weight: 700;
      border: none;
      cursor: pointer;
    }
    .need-help:hover { background: #DCE5FF; }
    .top-close {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
      color: var(--text-secondary); cursor: pointer;
      transition: background 0.15s;
    }
    .top-close:hover { background: rgba(0,0,0,0.05); }
    .top-close svg { width: 18px; height: 18px; }

    /* Page heading */
    main { flex: 1; padding: 32px 24px; }
    .page-heading {
      text-align: center;
      max-width: 720px;
      margin: 0 auto 28px;
    }
    .page-heading h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #222224;
      margin-bottom: 6px;
    }
    .page-heading p {
      font-size: 14.5px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* Form card */
    .form-card {
      max-width: 640px;
      margin: 0 auto;
      background: var(--neutral-0);
      border-radius: 12px;
      padding: 26px 28px 22px;
    }
    .form-section-h {
      font-size: 16px;
      font-weight: 700;
      color: #222224;
      margin-bottom: 18px;
    }

    /* Floating-label fields */
    .field { position: relative; margin-bottom: 14px; }
    .field input[type="text"],
    .field input[type="email"],
    .field input[type="tel"],
    .field input[type="date"],
    .field select,
    .field textarea {
      width: 100%;
      padding: 22px 14px 8px;
      border: 1.5px solid var(--border-strong);
      border-radius: 8px;
      font-family: 'Satoshi', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      background: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      appearance: none;
    }
    .field textarea { min-height: 88px; resize: vertical; padding-top: 24px; }
    .field select {
      background: #fff url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239AA2B2' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m6 9 6 6 6-6'/></svg>") no-repeat right 14px center / 18px;
      padding-right: 40px;
    }
    .field input:hover,
    .field select:hover,
    .field textarea:hover { border-color: var(--neutral-400); }
    .field input:focus,
    .field select:focus,
    .field textarea:focus { border-color: var(--primary-500); box-shadow: 0 0 0 4px var(--primary-50); }
    .field-label {
      position: absolute;
      top: 7px; left: 15px;
      font-family: 'Satoshi', sans-serif;
      font-size: 11.5px;
      font-weight: 500;
      color: var(--text-muted);
      pointer-events: none;
      letter-spacing: 0.2px;
    }
    .field-label .req { color: #B42318; margin-left: 1px; }
    .field-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; padding: 0 4px; }

    /* Phone input with country code */
    .phone-input { display: flex; gap: 0; position: relative; }
    .phone-input .cc {
      width: 90px;
      padding: 22px 14px 8px;
      border: 1.5px solid var(--border-strong);
      border-radius: 8px 0 0 8px;
      border-right: none;
      background: #fff;
      font-size: 15px; font-weight: 500; color: var(--text-primary);
      outline: none;
    }
    .phone-input .num {
      flex: 1;
      padding: 22px 14px 8px;
      border: 1.5px solid var(--border-strong);
      border-radius: 0 8px 8px 0;
      font-family: 'Satoshi', sans-serif;
      font-size: 15px; font-weight: 500;
      color: var(--text-primary); background: #fff; outline: none;
    }
    .phone-input .num:focus,
    .phone-input .cc:focus { border-color: var(--primary-500); }
    .phone-input .phone-label {
      position: absolute; top: 7px; left: 15px;
      font-size: 11.5px; color: var(--text-muted); font-weight: 500;
      pointer-events: none;
    }

    /* Field row */
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Bottom progress + actions */
    .footer-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--neutral-0);
      border-top: 1px solid var(--border);
      padding: 16px 32px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 20px;
    }
    .progress-row {
      position: absolute; top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--neutral-100);
    }
    .progress-fill {
      height: 100%;
      width: 25%;
      background: var(--primary-500);
      transition: width 0.3s;
    }
    .back-link {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 14px; font-weight: 700; color: var(--text-primary);
    }
    .back-link svg { width: 16px; height: 16px; }
    .back-link:hover { color: var(--primary-600); }
    .footer-right { display: flex; align-items: center; gap: 18px; }
    .next-label { font-size: 13.5px; color: var(--text-muted); }
    .next-label strong { color: var(--text-primary); font-weight: 600; margin-left: 4px; }
    .save-btn {
      padding: 12px 22px;
      background: var(--primary-500);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14.5px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .save-btn:hover { background: var(--primary-600); }

    @media (max-width: 720px) {
      .topbar { padding: 14px 16px; }
      main { padding: 24px 12px; }
      .form-card { padding: 20px; }
      .field-row { grid-template-columns: 1fr; }
      .footer-bar { padding: 12px 16px; }
      .next-label { display: none; }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <a href="dashboard.html" class="topbar-logo">
      <img src="wisemonk_logo_final.png" alt="Wisemonk">
    </a>
    <div class="topbar-right">
      <button class="need-help">Need help?</button>
      <a href="dashboard.html" class="top-close" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </a>
    </div>
  </header>

  <main>

    <div class="page-heading">
      <h1>Tell us about your business</h1>
      <p>This information helps us set up locally compliant contracts and the right tax handling for you.</p>
    </div>

    <div class="form-card">
      <div class="form-section-h">Business details</div>

      <div class="field">
        <input type="text" id="bname" value="Acme Studios Pvt. Ltd." />
        <label for="bname" class="field-label">Legal entity name <span class="req">*</span></label>
      </div>

      <div class="field-row">
        <div class="field">
          <select id="country">
            <option>India</option>
            <option>United States</option>
            <option>United Kingdom</option>
            <option>Singapore</option>
            <option>UAE</option>
            <option>Germany</option>
            <option>Australia</option>
          </select>
          <label for="country" class="field-label">Country of incorporation <span class="req">*</span></label>
        </div>
        <div class="field">
          <select id="btype">
            <option>Private Limited (Pvt Ltd)</option>
            <option>Limited Liability Partnership (LLP)</option>
            <option>Sole Proprietorship</option>
            <option>Partnership Firm</option>
            <option>Public Limited</option>
            <option>One Person Company (OPC)</option>
          </select>
          <label for="btype" class="field-label">Business type <span class="req">*</span></label>
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <input type="date" id="incorp" value="2021-06-14" />
          <label for="incorp" class="field-label">Date of incorporation <span class="req">*</span></label>
        </div>
        <div class="field">
          <select id="size">
            <option>1 – 10 employees</option>
            <option>11 – 50 employees</option>
            <option>51 – 200 employees</option>
            <option>201 – 500 employees</option>
            <option>500+ employees</option>
          </select>
          <label for="size" class="field-label">Company size</label>
        </div>
      </div>

      <div class="field">
        <textarea id="address" placeholder="">Plot 42, Sector 18, Gurugram, Haryana 122015</textarea>
        <label for="address" class="field-label">Registered office address <span class="req">*</span></label>
      </div>

      <div class="field-row">
        <div class="field phone-input">
          <select class="cc">
            <option>+91</option>
            <option>+1</option>
            <option>+44</option>
            <option>+65</option>
            <option>+971</option>
            <option>+49</option>
            <option>+61</option>
          </select>
          <input class="num" type="tel" value="98123 45678" />
          <label class="phone-label">Business contact number <span class="req">*</span></label>
        </div>
        <div class="field">
          <input type="email" id="bemail" value="hello@acmestudios.in" />
          <label for="bemail" class="field-label">Business email <span class="req">*</span></label>
        </div>
      </div>

      <p class="field-hint">All fields marked with <span style="color:#B42318;">*</span> are required. You can update these later in Settings.</p>
    </div>

  </main>

  <footer class="footer-bar">
    <div class="progress-row"><div class="progress-fill"></div></div>
    <a href="dashboard.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back
    </a>
    <div class="footer-right">
      <div class="next-label">Next: <strong>Verify your business</strong></div>
      <button class="save-btn">Save &amp; continue</button>
    </div>
  </footer>

</body>
</html>
