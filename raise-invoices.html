<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set up invoicing — Wisemonk</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand-50: #EBF2FF;
      --brand-100: #CCDEFF;
      --brand-500: #3080FF;
      --brand-600: #155DFC;
      --brand-700: #0B43B8;

      --neutral-0: #FFFFFF;
      --bg: #F6F9FF;
      --card: #FFFFFF;
      --border: #E5E7EB;
      --border-strong: #D1D5DB;
      --text-primary: #1F2937;
      --text-secondary: #4A5565;
      --text-muted: #6A7282;
      --muted-bg: #F4F6F9;

      --danger: #E40014;
      --success: #027A48;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Satoshi', sans-serif;
      font-weight: 500;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex; flex-direction: column;
    }
    a { text-decoration: none; color: inherit; }

    /* Topbar — sticky, 80px tall, centred 1440px max-width container */
    .topbar { position: sticky; top: 0; z-index: 30; background: var(--card); }
    .topbar-inner { height: 80px; max-width: 1440px; margin: 0 auto; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; }
    .topbar-logo { display: flex; height: 39px; overflow: hidden; }
    .topbar-logo img { height: 54px; width: auto; margin-top: -15px; display: block; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .need-help { display: inline-flex; align-items: center; height: 40px; padding: 0 16px; background: var(--brand-100); color: var(--brand-500); border-radius: 8px; font-family: inherit; font-size: 14px; font-weight: 700; border: none; cursor: pointer; transition: background 0.15s; }
    .need-help:hover { background: #B8CEFF; }
    .top-close { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; color: var(--text-muted); cursor: pointer; transition: background 0.15s, color 0.15s; }
    .top-close:hover { background: var(--muted-bg); color: var(--text-primary); }
    .top-close svg { width: 20px; height: 20px; }

    main { flex: 1; max-width: 1130px; margin: 0 auto; width: 100%; padding: 48px 24px 160px; }

    /* Page heading — left-aligned, 32px bold */
    .page-heading { text-align: left; max-width: 632px; margin: 0 auto 24px; padding: 0 4px; }
    .page-heading h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.4px; color: var(--text-primary); margin-bottom: 8px; line-height: 1.2; }
    .page-heading p { font-size: 14px; color: var(--text-muted); line-height: 1.55; }

    /* Section card — rounded-8px, no shadow, centred 632px column */
    .section-card { max-width: 632px; margin: 0 auto 16px; background: var(--card); border-radius: 8px; padding: 20px; }
    .section-card .section-title { font-size: 18px; font-weight: 700; color: var(--text-primary); margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .section-card .section-desc { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.55; }
    .section-card .section-desc:last-child { margin-bottom: 0; }
    .section-card .fields { display: flex; flex-direction: column; gap: 12px; }
    .section-card .fields + .section-title { margin-top: 28px; }

    /* Divided variant — title gets a horizontal hairline under it (used on compliance step) */
    .section-card.divided { padding: 24px; }
    .section-card.divided .section-title { padding-bottom: 16px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
    .section-card.divided .section-desc { margin-bottom: 16px; }

    /* Floating-label field — the centrepiece component */
    .fl-field { position: relative; }
    .fl-field input,
    .fl-field select,
    .fl-field textarea {
      width: 100%;
      padding: 24px 14px 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Satoshi', sans-serif;
      font-size: 16px;
      font-weight: 500;
      color: var(--text-primary);
      background: var(--card);
      outline: none;
      appearance: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      line-height: 1.2;
    }
    .fl-field textarea { min-height: 100px; resize: vertical; padding-top: 18px; }
    .fl-field select {
      padding-right: 40px;
      cursor: pointer;
      background: var(--card) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236A7282' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m6 9 6 6 6-6'/></svg>") no-repeat right 14px center / 18px;
    }
    .fl-field input::placeholder, .fl-field textarea::placeholder { color: transparent; }
    .fl-field input:focus::placeholder, .fl-field textarea:focus::placeholder { color: var(--text-muted); opacity: 0.6; }
    .fl-field input:hover, .fl-field select:hover, .fl-field textarea:hover { border-color: var(--border-strong); }
    .fl-field input:focus, .fl-field select:focus, .fl-field textarea:focus {
      border-color: var(--brand-500);
      border-width: 1px;
      box-shadow: 0 0 0 1.5px var(--brand-100);
    }
    /* Label — sits vertically centered when empty, lifts to top when filled or focused */
    .fl-field label {
      position: absolute;
      left: 14px;
      top: 50%; transform: translateY(-50%);
      font-size: 16px;
      font-weight: 500;
      color: var(--text-muted);
      pointer-events: none;
      transition: top 0.15s ease, font-size 0.15s ease, transform 0.15s ease;
      line-height: 1;
      max-width: calc(100% - 28px);
    }
    .fl-field input:not([type="date"]):focus ~ label,
    .fl-field input:not([type="date"]):not(:placeholder-shown) ~ label,
    .fl-field textarea:focus ~ label,
    .fl-field textarea:not(:placeholder-shown) ~ label,
    .fl-field select.touched ~ label,
    .fl-field input[type="date"].has-value ~ label,
    .fl-field input[type="date"]:focus ~ label,
    .fl-field.float label {
      top: 8px; transform: none;
      font-size: 10px;
      font-weight: 500;
    }
    /* Hide the browser's dd-mm-yyyy format string when the date input is empty + unfocused,
       so the centred floating label can sit on top without clashing. */
    .fl-field input[type="date"]:not(.has-value):not(:focus)::-webkit-datetime-edit { color: transparent; }
    .fl-field input[type="date"]:not(.has-value):not(:focus) { color: transparent; }
    .fl-field textarea ~ label { top: 18px; transform: none; }
    .fl-field textarea:focus ~ label,
    .fl-field textarea:not(:placeholder-shown) ~ label { top: 6px; }
    .fl-field .req { color: var(--text-muted); margin-left: 2px; font-weight: 500; }
    /* Select shows muted text colour until touched */
    .fl-field select:not(.touched) { color: var(--text-muted); }
    .fl-field select.touched { color: var(--text-primary); }
    .fl-field select:disabled { background: var(--muted-bg); border-color: var(--border); color: var(--text-muted); cursor: not-allowed; opacity: 0.75; }
    .fl-field select:disabled ~ label { color: var(--text-muted); }
    /* Read-only (auto-filled) field — locked, not editable */
    .fl-field input[readonly]:not([type="date"]) { background: var(--muted-bg); color: var(--text-muted); cursor: default; }
    .fl-field input[readonly]:not([type="date"]):hover { border-color: var(--border); }
    .fl-field input[readonly]:not([type="date"]):focus { border-color: var(--border); box-shadow: none; }

    /* 2-column field row */
    .fl-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .fl-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

    /* Custom select dropdown menu (replaces native browser dropdown) */
    .custom-select-menu {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px;
      max-height: 280px;
      overflow-y: auto;
      z-index: 50;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.10), 0 4px 8px rgba(0, 0, 0, 0.04);
    }
    .custom-select-menu.open { display: block; }
    .custom-select-item {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 10px 12px;
      background: transparent;
      border: none;
      text-align: left;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .custom-select-item:hover { background: var(--brand-50); }
    .custom-select-item.selected { background: var(--brand-50); color: var(--brand-500); font-weight: 700; }
    .custom-select-item.selected::after {
      content: '';
      width: 6px; height: 11px;
      margin-left: auto;
      border: solid var(--brand-500);
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
      margin-bottom: 3px;
    }
    /* Field that has its dropdown / calendar popover open */
    .fl-field.open { z-index: 51; }
    .fl-field.open > select {
      border-color: var(--brand-500) !important;
      border-width: 1px !important;
      box-shadow: 0 0 0 1.5px var(--brand-100);
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233080FF' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m6 15 6-6 6 6'/></svg>") !important;
    }
    .fl-field.open > input[type="date"] {
      border-color: var(--brand-500);
      border-width: 1px;
      box-shadow: 0 0 0 1.5px var(--brand-100);
    }

    /* Custom calendar popover (replaces native browser date picker) */
    .custom-calendar {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      width: 300px;
      z-index: 50;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.10), 0 4px 8px rgba(0, 0, 0, 0.04);
      font-family: inherit;
    }
    .custom-calendar.open { display: block; }
    .cal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .cal-title {
      font-size: 14.5px; font-weight: 700;
      color: var(--text-primary);
    }
    .cal-nav { display: flex; gap: 4px; }
    .cal-prev, .cal-next {
      width: 28px; height: 28px;
      background: transparent; border: none;
      border-radius: 6px;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s, color 0.1s;
    }
    .cal-prev:hover, .cal-next:hover { background: var(--muted-bg); color: var(--text-primary); }
    .cal-prev svg, .cal-next svg { width: 16px; height: 16px; }
    .cal-weekdays {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      margin-bottom: 6px;
    }
    .cal-weekdays span {
      font-size: 11px; font-weight: 700;
      color: var(--text-muted);
      text-align: center;
      padding: 6px 0;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .cal-days {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .cal-day {
      height: 36px;
      background: transparent; border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13.5px; font-weight: 500;
      color: var(--text-primary);
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }
    .cal-day:hover:not(.muted) { background: var(--brand-50); color: var(--brand-500); }
    .cal-day.muted { color: var(--text-muted); opacity: 0.45; cursor: pointer; }
    .cal-day.muted:hover { background: var(--muted-bg); opacity: 0.7; }
    .cal-day.today { color: var(--brand-500); font-weight: 700; }
    .cal-day.selected { background: var(--brand-500); color: #fff; font-weight: 700; }
    .cal-day.selected:hover { background: var(--brand-600); color: #fff; }
    .cal-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .cal-footer button {
      background: transparent; border: none;
      font-family: inherit;
      font-size: 13px; font-weight: 700;
      color: var(--brand-500);
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 6px;
      transition: background 0.1s;
    }
    .cal-footer button:hover { background: var(--brand-50); }

    /* Info icon (top-right of a field) + hover tooltip */
    .fl-field .info-icon {
      position: absolute; top: 14px; right: 14px;
      width: 22px; height: 22px;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: none; padding: 0;
      color: var(--text-muted); cursor: help;
      border-radius: 50%;
      z-index: 2;
      transition: color 0.15s, background 0.15s;
    }
    .fl-field .info-icon:hover { color: var(--brand-500); background: var(--brand-50); }
    .fl-field .info-icon svg { width: 16px; height: 16px; }
    /* Push the select chevron left when the field has an info icon */
    .fl-field.has-info select { padding-right: 64px; background-position: right 38px center; }
    /* Tooltip popover (pure CSS — uses data-tip attribute) */
    .info-icon[data-tip]:hover::after {
      content: attr(data-tip);
      position: absolute;
      right: -4px; bottom: calc(100% + 8px);
      background: var(--text-primary);
      color: #fff;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 12.5px; font-weight: 500; line-height: 1.5;
      width: 240px;
      white-space: normal;
      pointer-events: none;
      z-index: 100;
      box-shadow: 0 6px 18px rgba(0,0,0,0.18);
    }
    .info-icon[data-tip]:hover::before {
      content: '';
      position: absolute;
      right: 4px; bottom: calc(100% + 4px);
      border: 5px solid transparent;
      border-top-color: var(--text-primary);
      z-index: 101;
    }

    /* Phone input — combined widget with floating label */
    .fl-phone { position: relative; display: flex; }
    .fl-phone .cc {
      width: 84px; padding: 16px 28px 16px 14px;
      border: 1px solid var(--border);
      border-right: none;
      border-radius: 8px 0 0 8px;
      font-family: 'Satoshi', sans-serif;
      font-size: 16px; font-weight: 500;
      color: var(--text-primary);
      background: var(--card) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236A7282' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m6 9 6 6 6-6'/></svg>") no-repeat right 8px center / 14px;
      outline: none; appearance: none;
      cursor: pointer;
    }
    .fl-phone .num {
      flex: 1; padding: 24px 14px 8px;
      border: 1px solid var(--border);
      border-radius: 0 8px 8px 0;
      font-family: 'Satoshi', sans-serif;
      font-size: 16px; font-weight: 500;
      color: var(--text-primary);
      background: var(--card);
      outline: none;
      line-height: 1.2;
    }
    .fl-phone .num::placeholder { color: transparent; }
    .fl-phone .num:focus::placeholder { color: var(--text-muted); opacity: 0.6; }
    .fl-phone .num:focus, .fl-phone .cc:focus { border-color: var(--brand-500); border-width: 1px; box-shadow: 0 0 0 1.5px var(--brand-100); position: relative; z-index: 1; }
    .fl-phone label {
      position: absolute;
      left: 100px;
      top: 50%; transform: translateY(-50%);
      font-size: 16px; font-weight: 500;
      color: var(--text-muted);
      pointer-events: none;
      transition: top 0.15s ease, font-size 0.15s ease, transform 0.15s ease;
      line-height: 1;
      z-index: 2;
    }
    .fl-phone .num:focus ~ label,
    .fl-phone .num:not(:placeholder-shown) ~ label {
      top: 8px; transform: none;
      font-size: 10px;
    }
    .fl-phone .req { color: var(--text-muted); margin-left: 2px; }

    /* India-only variant — fixed +91 prefix, no chevron, single unified border */
    .fl-phone.fixed {
      align-items: stretch;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
    }
    .fl-phone.fixed:focus-within {
      border-color: var(--brand-500);
      box-shadow: 0 0 0 1.5px var(--brand-100);
    }
    .fl-phone.fixed .cc {
      display: flex; align-items: center;
      width: auto; padding: 0 6px 0 14px;
      border: none; border-radius: 0;
      background: none;
      cursor: default; appearance: none;
    }
    .fl-phone.fixed .num {
      padding: 24px 14px 8px 4px;
      border: none; border-radius: 8px;
      background: transparent;
    }
    .fl-phone.fixed .num:focus { box-shadow: none; }
    .fl-phone.fixed label { left: 52px; }

    /* Inline checkbox row inside section cards */
    .inline-check { display: flex; align-items: center; gap: 10px; padding: 4px 2px 0; }
    .inline-check input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--text-primary); cursor: pointer; }
    .inline-check label { font-size: 14px; font-weight: 500; color: var(--text-primary); cursor: pointer; }

    /* Field hint — sits inside .fl-field, hidden by default, slides in on focus */
    .fl-field .field-hint {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      padding: 0 4px;
      margin-top: 0;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: max-height 0.2s ease, opacity 0.2s ease, margin-top 0.2s ease;
    }
    .fl-field:focus-within .field-hint {
      max-height: 60px;
      opacity: 1;
      margin-top: 2px;
    }
    /* Free-standing field hint (used outside .fl-field, e.g. under a checkbox) */
    .field-hint { font-size: 12px; font-weight: 500; color: var(--text-muted); margin-top: 2px; padding: 0 4px; }

    /* Upload tile (single line, dashed) */
    .upload-tile {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      border: 1px dashed var(--border-strong);
      border-radius: 8px;
      background: var(--card);
      cursor: pointer;
      transition: all 0.15s;
    }
    .upload-tile:hover { border-color: var(--brand-500); background: var(--brand-50); }
    .upload-tile .ut-ico { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 6px; background: #F3F4F6; color: var(--text-muted); flex-shrink: 0; }
    .upload-tile .ut-ico svg { width: 18px; height: 18px; }
    .upload-tile .ut-body { flex: 1; min-width: 0; }
    .upload-tile .ut-title { display: block; font-size: 14px; font-weight: 700; color: var(--text-primary); line-height: 1.3; }
    .upload-tile .ut-sub { display: block; font-size: 12px; color: var(--text-muted); margin-top: 2px; line-height: 1.4; }
    .upload-tile.uploaded { border-style: solid; border-color: var(--brand-500); background: var(--brand-50); }
    .upload-tile.uploaded .ut-ico { background: var(--brand-100); color: var(--brand-500); }
    .upload-grid { display: flex; flex-direction: column; gap: 12px; }

    /* UBO card (legacy — no longer used after UBO step removal, kept for reuse) */
    .ubo-card { background: #FAFBFC; border-radius: 8px; padding: 20px; margin-bottom: 14px; }
    .ubo-card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .ubo-card-head h4 { font-size: 15px; font-weight: 700; color: var(--text-primary); }
    .ubo-remove { background: transparent; border: none; color: var(--danger); font-size: 13px; font-weight: 700; cursor: pointer; }
    .ubo-card .fields { display: flex; flex-direction: column; gap: 16px; }
    .add-ubo { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border: 1px dashed var(--brand-100); border-radius: 8px; background: transparent; color: var(--brand-500); font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; }
    .add-ubo:hover { background: var(--brand-50); }
    .add-ubo svg { width: 16px; height: 16px; }
    #directorList:not(:empty) { margin-bottom: 12px; }
    .director-block { display: flex; flex-direction: column; gap: 12px; }
    .director-block + .director-block { border-top: 1px solid var(--border); padding-top: 16px; margin-top: 4px; }
    .director-head { display: flex; align-items: center; justify-content: space-between; }
    .director-title { font-size: 14px; font-weight: 700; color: var(--text-primary); }
    .director-remove { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; border-radius: 6px; transition: background 0.15s, color 0.15s; }
    .director-remove:hover { background: var(--brand-50); color: var(--danger); }
    .director-remove svg { width: 16px; height: 16px; }

    /* Compliance attestation rows */
    .check-row { display: flex; gap: 12px; padding: 8px 0; align-items: flex-start; }
    .check-row input[type="checkbox"] { flex-shrink: 0; width: 18px; height: 18px; margin-top: 2px; accent-color: var(--brand-500); cursor: pointer; }
    .check-row label { font-size: 14px; font-weight: 500; line-height: 1.55; color: var(--text-primary); cursor: pointer; }
    .check-row label a.terms-link { color: var(--text-primary); font-weight: 700; text-decoration: underline; }
    .check-row input[type="radio"] { flex-shrink: 0; width: 18px; height: 18px; margin-top: 1px; accent-color: var(--brand-500); cursor: pointer; }
    .char-count { font-size: 12px; font-weight: 500; color: var(--text-muted); text-align: right; margin-top: 4px; padding: 0 4px; }
    .prohibited-toggle { display: inline-flex; align-items: center; gap: 6px; margin-top: 16px; color: var(--brand-500); font-weight: 700; font-size: 14px; cursor: pointer; }
    .prohibited-toggle svg { width: 16px; height: 16px; transition: transform 0.2s; }
    .prohibited-toggle.open svg { transform: rotate(180deg); }
    .prohibited-list { display: none; margin-top: 16px; padding: 16px 18px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; }
    .prohibited-list.open { display: block; }
    .prohibited-list > strong { display: block; font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
    .prohibited-list ul { padding-left: 18px; }
    .prohibited-list li { font-size: 13.5px; font-weight: 500; color: var(--text-secondary); line-height: 1.55; padding: 2px 0; }

    /* Pill row (toggle row on last step) */
    /* Selectable option cards (radio-style choice) */
    .option-cards { display: flex; flex-direction: column; gap: 12px; }
    .option-card { display: flex; align-items: flex-start; gap: 14px; width: 100%; text-align: left; padding: 16px; border: 1px solid var(--border); border-radius: 12px; background: var(--card); font-family: inherit; cursor: pointer; transition: border-color 0.15s, background 0.15s, box-shadow 0.15s; }
    .option-card:hover { border-color: var(--border-strong); }
    .option-card.selected { border-color: var(--brand-500); background: var(--brand-50); box-shadow: 0 0 0 1.5px var(--brand-100); }
    .option-card-icon { width: 40px; height: 40px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border-radius: 10px; background: #F3F4F6; color: var(--text-muted); transition: background 0.15s, color 0.15s; }
    .option-card.selected .option-card-icon { background: var(--brand-500); color: #fff; }
    .option-card-icon svg { width: 20px; height: 20px; }
    .option-card-body { flex: 1; }
    .option-card-title { display: block; font-size: 16px; font-weight: 700; color: var(--text-primary); line-height: 1.3; }
    .option-card-desc { display: block; font-size: 14px; color: var(--text-muted); margin-top: 4px; line-height: 1.55; }
    .option-card-radio { width: 20px; height: 20px; flex-shrink: 0; margin-top: 2px; border: 2px solid var(--border-strong); border-radius: 50%; position: relative; transition: border-color 0.15s; }
    .option-card.selected .option-card-radio { border-color: var(--brand-500); }
    .option-card.selected .option-card-radio::after { content: ''; position: absolute; inset: 3px; border-radius: 50%; background: var(--brand-500); }

    /* Inline info icon (in a question label, not a field) */
    .info-icon.inline { position: relative; top: auto; right: auto; width: 18px; height: 18px; vertical-align: middle; display: inline-flex; align-items: center; justify-content: center; background: transparent; border: none; padding: 0; color: var(--text-muted); cursor: help; border-radius: 50%; transition: color 0.15s, background 0.15s; }
    .info-icon.inline:hover { color: var(--brand-500); background: var(--brand-50); }
    .info-icon.inline svg { width: 16px; height: 16px; display: block; }

    /* Question label (above a choice control) */
    .q-label { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 12px; }
    .q-block { padding: 4px 0; }
    .q-block + .q-block { margin-top: 24px; padding-top: 24px; }

    /* Segmented pill (contract type) */
    .seg { display: inline-flex; gap: 8px; margin-bottom: 4px; }
    .seg button { padding: 8px 18px; border: 1px solid var(--border); background: var(--card); border-radius: 999px; font-family: inherit; font-size: 14px; font-weight: 700; color: var(--text-muted); cursor: pointer; transition: border-color 0.15s, color 0.15s, background 0.15s; }
    .seg button:hover { border-color: var(--border-strong); }
    .seg button.active { border-color: var(--brand-500); color: var(--brand-500); background: var(--brand-50); }
    .seg-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 10px; }

    /* Yes / No radio pills */
    .yn { display: inline-flex; gap: 8px; }
    .yn button { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px 8px 12px; border: 1px solid var(--border); background: var(--card); border-radius: 999px; font-family: inherit; font-size: 14px; font-weight: 600; color: var(--text-secondary); cursor: pointer; transition: border-color 0.15s, color 0.15s, background 0.15s; }
    .yn button:hover { border-color: var(--border-strong); }
    .yn .dot { width: 16px; height: 16px; border: 2px solid var(--border-strong); border-radius: 50%; position: relative; flex-shrink: 0; transition: border-color 0.15s; }
    .yn button.active { border-color: var(--brand-500); color: var(--brand-600); background: var(--brand-50); }
    .yn button.active .dot { border-color: var(--brand-500); }
    .yn button.active .dot::after { content: ''; position: absolute; inset: 3px; border-radius: 50%; background: var(--brand-500); }

    /* Choice cards (horizontal, no icon) */
    .choice-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .choice-card { text-align: left; padding: 14px 16px; border: 1px solid var(--border); border-radius: 10px; background: var(--card); font-family: inherit; cursor: pointer; transition: border-color 0.15s, background 0.15s, box-shadow 0.15s; }
    .choice-card:hover { border-color: var(--border-strong); }
    .choice-card.selected { border-color: var(--brand-500); background: var(--brand-50); box-shadow: 0 0 0 1.5px var(--brand-100); }
    .choice-card-title { display: block; font-size: 15px; font-weight: 700; color: var(--text-primary); line-height: 1.3; }
    .choice-card-desc { display: block; font-size: 13px; color: var(--text-muted); margin-top: 3px; line-height: 1.5; }

    /* Info banner */
    .info-banner { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; background: var(--brand-50); border-radius: 8px; margin-bottom: 16px; }
    .info-banner svg { width: 18px; height: 18px; color: var(--brand-500); flex-shrink: 0; margin-top: 1px; }
    .info-banner span { font-size: 13px; font-weight: 500; color: var(--text-secondary); line-height: 1.5; }

    /* Legal excerpt box */
    .excerpt { background: var(--muted-bg); border-radius: 8px; padding: 16px 18px; margin-top: 12px; }
    .excerpt .excerpt-tag { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .excerpt h5 { font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
    .excerpt p { font-size: 13.5px; font-weight: 500; color: var(--text-secondary); line-height: 1.6; margin-bottom: 10px; }
    .excerpt p:last-child { margin-bottom: 0; }

    /* Agreement file row + upload */
    .file-row { display: flex; align-items: center; gap: 14px; padding: 16px; border: 1px solid var(--border); border-radius: 10px; background: var(--card); cursor: pointer; transition: border-color 0.15s, background 0.15s; }
    .file-row:hover { border-color: var(--brand-500); background: var(--brand-50); }
    .file-pdf { width: 40px; height: 40px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border-radius: 8px; background: var(--brand-50); color: var(--brand-500); }
    .file-pdf svg { width: 22px; height: 22px; }
    .file-body { flex: 1; min-width: 0; }
    .file-title { display: block; font-size: 14px; font-weight: 700; color: var(--text-primary); line-height: 1.3; }
    .file-sub { display: block; font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .upload-link { display: inline-flex; align-items: center; gap: 6px; margin-top: 14px; color: var(--brand-500); font-size: 14px; font-weight: 700; cursor: pointer; background: none; border: none; font-family: inherit; padding: 0; }
    .upload-link svg { width: 16px; height: 16px; }
    .agreement-foot { max-width: 632px; margin: 8px auto 0; padding: 0 4px; font-size: 14px; color: var(--text-muted); text-align: center; }
    .agreement-foot a { color: var(--brand-500); font-weight: 700; }

    /* Step panels */
    .step { display: none; }
    .step.active { display: block; }

    /* Footer — 80px tall, 6px progress bar at very top, brand-100 track + brand-500 fill */
    .footer-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); z-index: 30; }
    .progress-row { height: 6px; background: var(--brand-100); }
    .progress-fill { height: 100%; background: var(--brand-500); transition: width 0.3s; }
    .footer-inner { height: 80px; max-width: 1440px; margin: 0 auto; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; gap: 20px; }
    .back-link { display: inline-flex; align-items: center; gap: 8px; height: 48px; padding: 0 20px; font-size: 16px; font-weight: 700; color: var(--text-primary); cursor: pointer; background: none; border: none; border-radius: 8px; transition: color 0.15s; }
    .back-link svg { width: 16px; height: 16px; }
    .back-link:hover:not(:disabled) { color: var(--text-secondary); }
    .back-link:disabled { opacity: 0.3; cursor: not-allowed; }
    .footer-right { display: flex; align-items: center; gap: 18px; }
    .next-label { font-size: 14px; color: var(--text-muted); }
    .next-label strong { color: var(--text-primary); font-weight: 700; margin-left: 4px; }
    .save-btn { height: 48px; padding: 0 28px; background: var(--brand-500); color: #fff; border: none; border-radius: 8px; font-family: inherit; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
    .save-btn:hover:not(:disabled) { background: var(--brand-600); }
    .save-btn:disabled { background: #E5E7EB; color: #99A1AF; cursor: not-allowed; }
    .save-btn.success:not(:disabled) { background: var(--brand-500); }

    @media (max-width: 720px) {
      .topbar { padding: 14px 16px; }
      main { padding: 32px 12px; }
      .page-heading h1 { font-size: 26px; }
      .fl-row, .fl-row-3, .choice-cards { grid-template-columns: 1fr; }
      .footer-inner { padding: 0 16px; }
      .next-label { display: none; }
    }
  </style>
</head>

  <header class="topbar">
    <div class="topbar-inner">
      <a href="freelancers.html" class="topbar-logo"><img src="wisemonk_logo_final.png" alt="Wisemonk"></a>
      <div class="topbar-right">
        <button class="need-help">Need help?</button>
        <a href="freelancers.html" class="top-close" aria-label="Close and exit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><use href="#ic-close"/></svg>
        </a>
      </div>
    </div>
  </header>

  <main>

    <div class="step active">
      <div class="page-heading">
        <h1>How should invoices be raised?</h1>
        <p>Choose how invoices are raised for this contractor. You can change it any time later.</p>
      </div>

      <div class="section-card">
        <div class="section-title">Invoicing</div>
        <div class="section-desc">Choose how invoices are raised for this contractor.</div>
        <div class="option-cards">
          <button type="button" class="option-card selected" data-invoice="auto">
            <span class="option-card-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><use href="#ic-receipt-text"/></svg>
            </span>
            <span class="option-card-body">
              <span class="option-card-title">Auto-generate each month</span>
              <span class="option-card-desc">Wisemonk creates and sends the invoice on the 1st of every month &mdash; no action needed from the contractor.</span>
            </span>
            <span class="option-card-radio"></span>
          </button>
          <button type="button" class="option-card" data-invoice="request">
            <span class="option-card-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><use href="#ic-document-upload"/></svg>
            </span>
            <span class="option-card-body">
              <span class="option-card-title">On contractor request</span>
              <span class="option-card-desc">The contractor submits their own invoice each cycle and you approve it before payout.</span>
            </span>
            <span class="option-card-radio"></span>
          </button>
        </div>
      </div>

  </main>

  <footer class="footer-bar">
    <div class="progress-row"><div class="progress-fill" style="width:100%"></div></div>
    <div class="footer-inner">
      <button class="back-link" onclick="history.length > 1 ? history.back() : (location.href='freelancers.html')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><use href="#ic-arrow-left"/></svg>
        Back
      </button>
      <div class="footer-right">
        <button class="save-btn success" onclick="location.href='freelancers.html'">Finish setup</button>
      </div>
    </div>
  </footer>

  <script>
    document.querySelectorAll('.option-card').forEach(function (c) {
      c.addEventListener('click', function () {
        document.querySelectorAll('.option-card').forEach(function (x) { x.classList.remove('selected'); });
        c.classList.add('selected');
      });
    });
  </script>
