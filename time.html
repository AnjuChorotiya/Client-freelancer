<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time — Wisemonk</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-50: #E8F2FF;
      --primary-100: #C5DCFF;
      --primary-500: #2684FF;
      --primary-600: #1A6FE0;
      --primary-700: #1059BD;
      --accent-500: #2684FF;
      --accent-tint: rgba(38, 132, 255, 0.10);
      --neutral-0: #FFFFFF;
      --neutral-50: #F7F8FA;
      --neutral-100: #EEF0F4;
      --neutral-200: #DDE1E9;
      --neutral-300: #C4CAD6;
      --neutral-400: #9AA2B2;
      --neutral-500: #6B7588;
      --neutral-700: #363D4D;
      --neutral-800: #222733;
      --neutral-900: #121620;
      --grey-300: #ABADB1;
      --grey-700: #222224;
      --bg-subtle: #F1F8FF;
      --border: #EEF0F4;
      --border-strong: #DDE1E9;
      --text-primary: #222733;
      --text-secondary: #363D4D;
      --text-muted: #9AA2B2;
      --success-50: #E6F9F0;
      --success-700: #027A48;
      --warning-50: #FFFAEB;
      --warning-700: #B54708;
      --radius-md: 12px;
      --radius-full: 100px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Satoshi', sans-serif; background: var(--bg-subtle); color: var(--text-primary); min-height: 100vh; }
    a { text-decoration: none; color: inherit; }
    .app { display: flex; min-height: 100vh; }

    .sidebar { width: 240px; flex-shrink: 0; background: var(--neutral-0); border-right: 1px solid var(--border); padding: 30px 20px; display: flex; flex-direction: column; gap: 32px; }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; height: 26px; overflow: hidden; }
    .sidebar-logo img { height: 56px; width: auto; margin-top: -30px; display: block; }
    .nav-section { display: flex; flex-direction: column; }
    .nav-title { font-family: 'Open Sans', sans-serif; font-weight: 300; font-size: 13px; letter-spacing: 0.5px; color: var(--grey-300); padding: 8px; margin-bottom: 2px; }
    .nav-link { display: flex; align-items: center; gap: 10px; height: 36px; padding: 0 8px; border-radius: 8px; font-weight: 500; font-size: 15px; color: var(--grey-700); transition: background 0.15s; }
    .nav-link:hover { background: var(--neutral-50); }
    .nav-link.active { background: var(--accent-tint); color: var(--accent-500); }
    .nav-link.active .nav-icon { color: var(--accent-500); }
    .nav-icon { width: 20px; height: 20px; flex-shrink: 0; color: var(--grey-700); }

    .main-col { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 20px 40px 20px 20px; background: var(--bg-subtle); }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .user-chip { display: flex; align-items: center; gap: 8px; padding: 4px 8px 4px 4px; border-radius: 100px; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent-500); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
    .user-name { font-weight: 500; font-size: 16px; color: var(--grey-700); }

    .content { flex: 1; padding: 8px 40px 56px 20px; }

    .title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; margin-bottom: 24px; }
    .title-row h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 4px; }
    .title-row p { font-size: 14px; color: var(--text-secondary); }
    .title-actions { display: flex; gap: 8px; align-items: center; }
    .range-picker {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 14px;
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      background: var(--neutral-0);
      font-family: inherit; font-size: 14px; font-weight: 600;
      color: var(--text-primary);
      cursor: pointer; transition: all 0.15s;
    }
    .range-picker:hover { background: var(--neutral-50); }
    .range-picker svg { width: 16px; height: 16px; color: var(--text-muted); }
    .secondary-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 10px; background: var(--neutral-0); color: var(--text-primary); border: 1px solid var(--border-strong); font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .secondary-btn:hover { background: var(--neutral-50); }
    .secondary-btn svg { width: 16px; height: 16px; }

    /* Stats strip */
    .stats-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-mini { background: var(--neutral-0); border: 1px solid var(--border); border-radius: 8px; padding: 18px 20px; }
    .stat-mini-label { font-size: 12.5px; color: var(--text-muted); font-weight: 600; margin-bottom: 6px; }
    .stat-mini-value { font-size: 24px; font-weight: 700; letter-spacing: -0.3px; }
    .stat-mini-sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .stat-mini-sub .up { color: var(--success-700); font-weight: 700; }

    /* Two-column layout: timesheet on left, breakdown on right */
    .time-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 20px;
    }
    .panel {
      background: var(--neutral-0);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 22px;
    }
    .panel-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .panel-head h2 { font-size: 16px; font-weight: 700; }
    .panel-head a { font-size: 13px; font-weight: 600; color: var(--primary-500); }

    /* Bar chart (week view) */
    .week-chart {
      display: flex; align-items: flex-end;
      gap: 16px;
      height: 180px;
      padding: 12px 4px 0;
      border-top: 1px solid var(--border);
    }
    .day-col {
      flex: 1;
      display: flex; flex-direction: column; align-items: center;
      gap: 8px;
    }
    .day-bar-wrap {
      flex: 1;
      width: 100%;
      display: flex; align-items: flex-end;
      max-width: 36px;
    }
    .day-bar {
      width: 100%;
      background: linear-gradient(180deg, #4D97FF, #0026FF);
      border-radius: 6px 6px 0 0;
      min-height: 4px;
      position: relative;
    }
    .day-bar.empty { background: var(--neutral-100); }
    .day-bar-label { font-size: 11px; font-weight: 700; color: var(--text-primary); position: absolute; top: -18px; left: 50%; transform: translateX(-50%); }
    .day-label { font-size: 12px; font-weight: 600; color: var(--text-muted); }
    .day-label.today { color: var(--primary-600); }

    /* Breakdown list */
    .breakdown-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0;
      border-top: 1px solid var(--border);
    }
    .breakdown-row:first-of-type { border-top: none; }
    .br-avatar { width: 32px; height: 32px; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11.5px; font-weight: 700; flex-shrink: 0; }
    .br-body { flex: 1; min-width: 0; }
    .br-name { font-size: 13.5px; font-weight: 700; line-height: 1.2; }
    .br-track {
      height: 5px;
      background: var(--neutral-100);
      border-radius: 100px; margin-top: 5px; overflow: hidden;
    }
    .br-fill { height: 100%; background: linear-gradient(90deg, #0026FF, #2684FF); border-radius: 100px; }
    .br-hours { font-size: 13.5px; font-weight: 700; min-width: 36px; text-align: right; }

    /* Time entries table — wm-table aligned */
    .table-card { background: #ffffff; border: 1px solid #f0f1f1; border-radius: 8px; overflow: hidden; margin-top: 20px; }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #f9fafb; border-bottom: 1px solid #e5e7eb; }
    thead th { text-align: left; padding: 12px 20px; font-family: 'Open Sans', sans-serif; font-size: 13px; font-weight: 600; color: #404145; }
    tbody tr { border-top: 1px solid #f0f1f1; transition: background 0.2s ease; }
    tbody tr:first-child { border-top: none; }
    tbody tr:hover { background: #fafbfc; }
    tbody td { padding: 14px 20px; font-family: 'Open Sans', sans-serif; font-size: 14px; font-weight: 400; color: #626368; vertical-align: middle; }
    .cell-name { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .cell-avatar { width: 36px; height: 36px; background: #2684ff; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-family: 'Open Sans', sans-serif; font-size: 14px; font-weight: 600; flex-shrink: 0; }
    .cell-name span:not(.cell-avatar) { color: #222224; font-family: 'Satoshi', sans-serif; font-weight: 500; }
    .text-right { text-align: right; }
    .hours-cell { font-family: 'Satoshi', sans-serif; font-weight: 500; color: #222224; }
    .pill { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 16px; font-family: 'Satoshi', sans-serif; font-size: 12px; font-weight: 500; }
    .pill.approved { background: #E1EDFF; color: #2684FF; }
    .pill.pending  { background: #FEF9C3; color: #CA8A04; }

    @media (max-width: 1180px) { .time-grid { grid-template-columns: 1fr; } }
    @media (max-width: 980px) {
      .sidebar { display: none; }
      .header { padding: 16px 20px; }
      .content { padding: 8px 20px 56px; }
      .stats-strip { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="app">

    <aside class="sidebar">
      <a href="home.html" class="sidebar-logo">
        <img src="wisemonk_logo_final.png" alt="Wisemonk">
      </a>
      <nav class="nav-section">
        <div class="nav-title">WORKSPACE</div>
        <a href="home.html" class="nav-link">
          <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
          Home
        </a>
        <a href="freelancers.html" class="nav-link">
          <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
          Freelancers
        </a>
        <a href="invoices.html" class="nav-link">
          <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 7h8M8 11h8M8 15h5"/></svg></span>

        </a>
        <a href="time.html" class="nav-link active">
          <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
          Time
        </a>
      </nav>
    </aside>

    <div class="main-col">

      <header class="header">
        <div></div>
        <div class="header-right">
          <div class="user-chip">
            <span class="user-avatar">AS</span>
            <span class="user-name">Aman Singh</span>
          </div>
        </div>
      </header>

      <div class="content">

        <div class="title-row">
          <div>
            <h1>Time</h1>
            <p>Track and approve hours logged by your team.</p>
          </div>
          <div class="title-actions">
            <button class="range-picker">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
              This week
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
            </button>
          </div>
        </div>


      </div>
    </div>
  </div>

</body>
